# ============================================
# OCR 档案识别系统 - Docker Compose 配置
# 使用方式：docker compose up -d
# ============================================

services:
  # ==================== 后端服务 ====================
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ocr-backend
    restart: unless-stopped
    init: true
    shm_size: 8gb
    gpus: all
    environment:
      # 数据库配置
      - DATABASE_URL=postgresql+asyncpg://ocruser:${POSTGRES_PASSWORD:-ocr123456}@postgres:5432/ocr_db
      # Redis 配置
      - REDIS_URL=redis://redis:6379/0
      # 目录配置
      - UPLOAD_DIR=/app/uploads
      - CACHE_DIR=/app/.cache
      - PADDLE_PDX_CACHE_HOME=/app/.cache/paddlex
      - HF_HOME=/app/.cache/huggingface
      - PADDLE_PDX_DISABLE_MODEL_SOURCE_CHECK=True
      # OCR 配置（GPU）
      - OCR_USE_GPU=true
      - OCR_DEVICE=gpu:0
      - OCR_LANG=ch
      - AUTH_ENABLED=false
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,utility
    volumes:
      # 持久化上传文件
      - ocr_uploads:/app/uploads
      # 持久化模型缓存（避免重复下载）
      - ocr_cache:/app/.cache
      # 日志
      - ocr_logs:/app/logs
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # GPU 支持
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s  # OCR 模型加载需要时间

  # ==================== 前端服务 ====================
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: ocr-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3

  # ==================== PostgreSQL 数据库 ====================
  postgres:
    image: postgres:15-alpine
    container_name: ocr-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=ocruser
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-ocr123456}
      - POSTGRES_DB=ocr_db
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ocruser -d ocr_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==================== Redis 缓存 ====================
  redis:
    image: redis:7-alpine
    container_name: ocr-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - ocr-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

# ==================== 数据卷 ====================
volumes:
  postgres_data:
    name: ocr_postgres_data
  redis_data:
    name: ocr_redis_data
  ocr_uploads:
    name: ocr_uploads
  ocr_cache:
    name: ocr_cache
  ocr_logs:
    name: ocr_logs

# ==================== 网络 ====================
networks:
  ocr-network:
    name: ocr-network
    driver: bridge
